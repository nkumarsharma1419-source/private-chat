<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Private Galaxy Chat</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="chat-container">

  <div class="chat-header">

    <div class="left">

      <div class="avatar">
        🚀
      </div>

      <div>
        <h2>Private Galaxy Chat</h2>

        <div class="status">

          <div class="dot"></div>

          <span id="onlineCount">
            1 Online
          </span>

        </div>

      </div>

    </div>

  </div>

  <div id="messages">

  </div>

  <div id="typing">
  </div>

  <div class="input-area">

    <button class="icon-btn">
      😀
    </button>

    <button class="icon-btn">
      📎
    </button>

    <input
      type="text"
      id="msg"
      placeholder="Type a message..."
    >

    <button id="sendBtn">
      ➤
    </button>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js"></script>

</body>
</html>
